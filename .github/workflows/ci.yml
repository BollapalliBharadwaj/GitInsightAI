name: GitInsight AI CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    name: Backend CI (Python Lint & Test)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'backend/requirements.txt'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        # Install dev testing tools directly
        pip install pytest pytest-asyncio pytest-cov

    - name: Python Compile Syntax Check
      run: |
        python -m py_compile backend/app/main.py backend/services/security_analyzer.py

    - name: Run Backend Tests
      env:
        DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      run: |
        pytest backend/tests/ -v --cov=backend

  frontend-ci:
    name: Frontend CI (Node Build check)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install Dependencies
      cwd: ./frontend
      run: npm ci

    - name: Compile Frontend Production Build
      cwd: ./frontend
      run: npm run build
